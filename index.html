<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Login Form | Pixelita</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/cb0098a9b0.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <!-- Code by Pixelita -->
  <body>
    <div class="container">
      <form action="#">
        <div class="title">Login</div>
        <div class="input-box">
          <input type="text" placeholder="Enter your Email Id" />
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="password" placeholder="Enetr your Password" />
          <div class="underline"></div>
        </div>
        <div class="input-box">
          <input type="submit" />
        </div>
      </form>
      <div class="option">Or Connect With</div>
      <div class="google">
        <a href="#"><i class="fab fa-google"></i>Login with Google</a>
      </div>
      <div class="twitter">
        <a href="#"><i class="fab fa-twitter"></i>Login with Twitter</a>
      </div>
    </div>
  </body>
</html>
